@import url('https://fonts.googleapis.com/css2?family=Lilita+One&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Lilita One',cursive;color:#fff;
  min-height:100vh;padding-bottom:140px;
  background:
    radial-gradient(ellipse at 20% 20%,rgba(124,77,255,.22) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 80%,rgba(92,45,158,.22) 0%,transparent 55%),
    #1a0a2e;
  background-attachment:fixed;
}
.ad-top{max-width:728px;margin:0 auto;padding:6px 10px 0;text-align:center}
.hdr{
  background:linear-gradient(180deg,#4a1fa8,#1e0c55);
  border-bottom:3px solid #f9a825;box-shadow:0 4px 20px rgba(0,0,0,.6);
  padding:10px 16px 12px;text-align:center;position:sticky;top:0;z-index:100;
}
.lvl-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
.hdr-icon{width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 0 8px #ffd740)}
.lvl-num{font-size:36px;color:#ffd740;text-shadow:2px 2px 0 #e65100,0 0 20px rgba(255,215,64,.5);line-height:1}
.lvl-input{
  background:rgba(0,0,0,.45);border:2px solid #f9a825;border-radius:10px;
  color:#ffd740;font-family:'Lilita One',cursive;font-size:22px;
  text-align:center;width:120px;padding:5px 8px;outline:none;
  -webkit-appearance:none;appearance:none;
}
.lvl-input::-webkit-outer-spin-button,.lvl-input::-webkit-inner-spin-button{-webkit-appearance:none}
.layout{display:flex;justify-content:center;align-items:flex-start;max-width:1200px;margin:0 auto}
.main{width:100%;max-width:520px;padding:10px}
.ad-side{display:none;width:170px;flex-shrink:0;padding:8px 6px;position:sticky;top:90px}
@media(min-width:900px){.ad-side{display:block}}
.rg{
  border:2px solid #f9a825;border-radius:14px;padding:6px;
  margin-bottom:12px;background:rgba(45,27,94,.45);
  box-shadow:0 0 12px rgba(249,168,37,.15);
}
.ad-mob{display:block;text-align:center;margin-bottom:12px}
@media(min-width:900px){.ad-mob{display:none}}
.rr{
  display:flex;align-items:center;
  background:linear-gradient(90deg,rgba(60,35,110,.8),rgba(45,27,94,.6));
  border:1.5px solid #6c3fa8;border-radius:9px;
  padding:6px 12px;margin-bottom:4px;gap:8px;height:56px;
  position:relative;overflow:hidden;
}
.rr:last-child{margin-bottom:0}
.rr.key{border-color:rgba(249,168,37,.6);background:linear-gradient(90deg,rgba(249,168,37,.14),rgba(45,27,94,.6))}
.rr.nxt{border-color:#69f0ae!important;background:linear-gradient(90deg,rgba(22,80,50,.85),rgba(45,27,94,.6))!important;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(105,240,174,.3)}50%{box-shadow:0 0 18px rgba(105,240,174,.7)}}
.rr.done{opacity:.35;filter:grayscale(.3)}
.rr.done::after{content:'✓';position:absolute;right:10px;font-size:16px;color:#69f0ae;opacity:.7}
.rl{display:flex;align-items:center;gap:5px;min-width:72px}
.rl img{width:22px;height:22px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 0 4px #ffd740)}
.rl span{font-size:17px;color:#ffd740;text-shadow:2px 2px 4px rgba(0,0,0,.8);white-space:nowrap}
.rright{margin-left:auto;display:flex;align-items:center;gap:7px}
.rright img{width:46px;height:46px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.7))}
.rright span{font-size:16px;color:#fff;text-shadow:2px 2px 4px rgba(0,0,0,.8);min-width:28px;text-align:right}
.bb{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,#0c041a,rgba(26,10,46,.97));
  border-top:2.5px solid #f9a825;z-index:200;padding:5px 6px 8px;
}
.bbg{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,auto);gap:3px 2px;max-width:520px;margin:0 auto}
.bbi{display:flex;flex-direction:column;align-items:center;gap:1px;padding:2px 0}
.bbi img{width:36px;height:36px;object-fit:contain}
.arr{font-size:9px;color:#69f0ae;line-height:1}
.bnum{font-size:11px;color:#ffd740;line-height:1;white-space:nowrap;text-shadow:2px 2px 4px rgba(0,0,0,.8)}
@media(min-width:600px){
  .bbg{grid-template-columns:repeat(8,1fr);grid-template-rows:auto;max-width:600px}
  .bbi img{width:40px;height:40px}
  .bnum{font-size:12px}
  .bb{padding:6px 20px 10px}
}
#loading{text-align:center;padding:50px;font-size:32px;color:#ffd740;animation:fl 1s infinite}
@keyframes fl{0%,100%{opacity:1}50%{opacity:.2}}
</style>

function key(r){return r.Consumable||r.Resource||r.MysteryBox||r.Banner||'default'}

let uLvl=0, nxi=-1;

// Pre-build groups once
const groups=[];
let cur=[];
for(const r of D){cur.push(r);if(r.IsKey){groups.push(cur);cur=[];}}
if(cur.length)groups.push(cur);

function bbUpdate(){
  const g=document.getElementById('bbg');
  let h='';
  for(const t of BB){
    const nx=D.find(r=>key(r)===t&&r.RequiredLevel>uLvl);
    h+=`<div class="bbi"><img src="${t}.png"><span class="arr">▲</span><span class="bnum">${nx?'+'+String(nx.RequiredLevel-uLvl):'—'}</span></div>`;
  }
  g.innerHTML=h;
}

// Build one group element — pure DOM, no innerHTML
function mkGroup(items, nxi){
  const g=document.createElement('div');
  g.className='rg';
  for(const item of items){
    const k=key(item);
    const r=document.createElement('div');
    const cl=['rr'];
    if(item.IsKey) cl.push('key');
    if(uLvl>=item.RequiredLevel) cl.push('done');
    if(D.indexOf(item)===nxi) cl.push('nxt');
    r.className=cl.join(' ');

    const rl=document.createElement('div'); rl.className='rl';
    const ri=document.createElement('img'); ri.src='CollectionLvl.png';
    const rs=document.createElement('span'); rs.textContent=item.RequiredLevel;
    rl.appendChild(ri); rl.appendChild(rs);

    const rr=document.createElement('div'); rr.className='rright';
    const ri2=document.createElement('img'); ri2.src=k+'.png';
    const rs2=document.createElement('span'); rs2.textContent=item.Amount.toLocaleString();
    rr.appendChild(ri2); rr.appendChild(rs2);

    r.appendChild(rl); r.appendChild(rr);
    g.appendChild(r);
  }
  return g;
}

function mkMobAd(){
  const d=document.createElement('div');
  d.className='ad-mob';
  const ins=document.createElement('ins');
  ins.className='adsbygoogle';
  ins.style.cssText='display:block;min-height:90px';
  ins.dataset.adClient='ca-pub-2570657624074859';
  ins.dataset.adSlot='1900962538';
  ins.dataset.adFormat='fluid';
  ins.dataset.fullWidthResponsive='true';
  d.appendChild(ins);
  return d;
}

let cursor=0;
const CHUNK=6; // groups per idle chunk
let renderScheduled=false;
const list=document.getElementById('list');

function renderChunk(){
  renderScheduled=false;
  if(cursor>=groups.length) return;
  const end=Math.min(cursor+CHUNK, groups.length);
  const frag=document.createDocumentFragment();
  for(let i=cursor;i<end;i++){
    frag.appendChild(mkGroup(groups[i], nxi));
    if((i+1)%3===0){
      frag.appendChild(mkMobAd());
    }
  }
  list.appendChild(frag);
  cursor=end;
  // push new ad slots
  try{
    //list.querySelectorAll('.ad-mob ins:not([data-ad-status])').forEach(()=>(adsbygoogle=window.adsbygoogle||[]).push({}));
	list.querySelectorAll('.ad-mob ins').forEach(el=>{
	  if(el.dataset.loaded) return;

	  try{
		(adsbygoogle = window.adsbygoogle || []).push({});
		el.dataset.loaded = "1";
	  }catch(e){}
	});
  }catch(e){}
  // schedule next chunk
  if(cursor<groups.length){
    scheduleChunk();
  }
}

function scheduleChunk(){
  if(renderScheduled) return;
  renderScheduled=true;
  if(typeof requestIdleCallback!=='undefined'){
    requestIdleCallback(renderChunk,{timeout:100});
  } else {
    setTimeout(renderChunk,16);
  }
}

function init(){
  nxi=D.findIndex(r=>r.RequiredLevel>uLvl);
  cursor=0;
  list.innerHTML='';
  bbUpdate();
  // First 2 chunks sync so page isn't empty
  renderChunk();
  renderChunk();
  // Rest via idle
  scheduleChunk();
  if(uLvl>0&&nxi>=0){
    setTimeout(()=>{
      const el=list.querySelector('.nxt');
      if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
    },500);
  }
}

document.getElementById('inp').addEventListener('input',function(){
  clearTimeout(this._t);
  this._t=setTimeout(()=>{
    const v=parseInt(this.value,10);
    uLvl=isNaN(v)?0:v;
    document.getElementById('dn').textContent=uLvl||'—';
    init();
  },300);
});

document.getElementById('loading').style.display='none';
document.getElementById('layout').style.display='flex';
init();
</script>
